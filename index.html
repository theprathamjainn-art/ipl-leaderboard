<!DOCTYPE html>
<html>
<head>
<title>IPL Prediction League</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  color: #22c55e;
  padding: 15px;
}

table {
  margin: auto;
  border-collapse: collapse;
  width: 95%;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

th {
  background: #22c55e;
  color: black;
}

tr:hover {
  background: #334155;
}

.rank1 { color: gold; font-weight: bold; }
.rank2 { color: silver; }
.rank3 { color: #cd7f32; }

.footer {
  margin-top: 15px;
  font-size: 14px;
  color: #94a3b8;
}
</style>

</head>

<body>

<h1>🏏 IPL Prediction League</h1>

<table id="table"></table>

<div class="footer">
Live • Auto Updated • Share in WhatsApp 🚀
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkqhjf4MFdkGtA4waWvQWerNMNBk669hqRM03Wz_HgTV3MU3OEVSkIMO-31gncNRMKCs6PBzhkwVhN/pub?gid=1572340045&single=true&output=csv";

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));

    let html = "<tr>";
    rows[0].forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    for(let i=1; i<rows.length; i++){
      if(rows[i][0]){

        let cls = "";
        if(i==1) cls="rank1";
        else if(i==2) cls="rank2";
        else if(i==3) cls="rank3";

        html += `<tr class="${cls}">`;
        rows[i].forEach(c => html += `<td>${c}</td>`);
        html += "</tr>";
      }
    }

    document.getElementById("table").innerHTML = html;
  });

</script>

</body>
</html>
