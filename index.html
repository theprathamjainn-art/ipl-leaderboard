<!DOCTYPE html>
<html>
<head>
<title>IPL Prediction League</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  color: #22c55e;
  padding: 15px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.cards {
  display: flex;
  justify-content: space-around;
  margin: 20px;
  flex-wrap: wrap;
}

.card {
  padding: 15px;
  border-radius: 12px;
  width: 28%;
  margin: 5px;
}

.gold { background: gold; color: black; }
.silver { background: silver; color: black; }
.bronze { background: #cd7f32; color: black; }

table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

th {
  background: #22c55e;
  color: black;
}

tr:hover {
  background: #334155;
}

.footer {
  margin: 10px;
  font-size: 13px;
  color: #94a3b8;
}

.submit-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #f59e0b;
  color: black;
  border-radius: 8px;
  font-weight: bold;
  text-decoration: none;
}
</style>

</head>

<body>

<h1>🏏 IPL Prediction League</h1>

<button onclick="loadData()">🔄 Refresh</button>

<br>

<a class="submit-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeioQJZrqyLZPa0nGyin5-N2ImvSERcHZsSK1_c3bqSBoxJvQ/viewform?usp=dialog" target="_blank">
📝 Submit Prediction
</a>

<div class="cards" id="top3"></div>

<table id="table"></table>

<div class="footer">
Live • Auto Updated • Share in WhatsApp 🚀
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkqhjf4MFdkGtA4waWvQWerNMNBk669hqRM03Wz_HgTV3MU3OEVSkIMO-31gncNRMKCs6PBzhkwVhN/pub?gid=1572340045&single=true&output=csv";

function loadData(){

fetch(sheetURL)
.then(res => res.text())
.then(data => {

let rows = data.trim().split("\n").map(r => r.split(","));

let header = rows[0];
let players = rows.slice(1);

// ✅ SORT BY POINTS
players.sort((a, b) => Number(b[1]) - Number(a[1]));

// ✅ RANK LOGIC
let lastPoints = null;
let rank = 0;

let html = "<tr><th>Rank</th>";
header.forEach(h => html += `<th>${h}</th>`);
html += "<th>Status</th><th>Reason</th></tr>";

let topHTML = "";

players.forEach((row, index) => {

if(row[0]){

let name = row[0];
let points = Number(row[1]);
let amount = row[2];
let status = row[3];
let reason = row[4];

// rank logic
if(points !== lastPoints){
rank = index + 1;
lastPoints = points;
}

// ✅ TOP 3 FIXED
if(rank <= 3){
let cls = rank==1 ? "gold" : rank==2 ? "silver" : "bronze";

topHTML += `
<div class="card ${cls}">
<h3>#${rank}</h3>
<p><b>${name}</b></p>
<p>Points: ${points}</p>
<p>₹ ${amount}</p>
</div>`;
}

// TABLE
html += "<tr>";
html += `<td><b>${rank}</b></td>`;

row.forEach((c, i) => {

if(i==0 && rank==1){
html += `<td style="color:gold;font-weight:bold">${c}</td>`;
}else{
html += `<td>${c}</td>`;
}

});

html += `<td>${status}</td>`;
html += `<td>${reason}</td>`;
html += "</tr>";

}

});

document.getElementById("table").innerHTML = html;
document.getElementById("top3").innerHTML = topHTML;

});

}

loadData();

</script>

</body>
</html>
