<!DOCTYPE html>
<html>
<head>
<title>IPL Prediction League</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  color: #22c55e;
}

table {
  width: 95%;
  margin: auto;
  border-collapse: collapse;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

th {
  background: #22c55e;
  color: black;
}

tr:hover {
  background: #334155;
}

.top {
  color: gold;
  font-weight: bold;
}

button {
  margin: 15px;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>🏏 IPL Prediction League</h1>

<button onclick="loadData()">🔄 Refresh</button>

<table id="table"></table>

<div class="footer">
Live • Auto Updated • Share in WhatsApp 🚀
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkqhjf4MFdkGtA4waWvQWerNMNBk669hqRM03Wz_HgTV3MU3OEVSkIMO-31gncNRMKCs6PBzhkwVhN/pub?gid=1572340045&single=true&output=csv";

function loadData(){

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const rows = data.trim().split("\n").map(r => r.split(","));

let html = "<tr>";

rows[0].forEach(h => html += `<th>${h}</th>`);
html += "<th>Status</th><th>Reason</th></tr>";

for(let i=1; i<rows.length; i++){

if(rows[i][0]){

let winner = rows[i][4];
let batsman = rows[i][5];
let exact = rows[i][6];

let status = "";
if(winner==1 && batsman==1) status = "✅🔥";
else if(winner==1) status = "✅";
else if(batsman==1) status = "🔥";
else status = "❌";

let reason = "No Win ❌";
if(exact==1) reason = "🏆 Exact Winner";
else if(winner==1) reason = "Won from Winner Pool";
else if(batsman==1) reason = "Won from Batsman Pool";

html += "<tr>";

rows[i].forEach((c, index) => {

if(index==1 && i==1){
html += `<td class="top">${c}</td>`;
}else{
html += `<td>${c}</td>`;
}

});

html += `<td>${status}</td>`;
html += `<td>${reason}</td>`;

html += "</tr>";

}

}

document.getElementById("table").innerHTML = html;

});

}

loadData();

</script>

</body>
</html>
